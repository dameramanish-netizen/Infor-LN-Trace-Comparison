name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allows you to manually trigger the sync if needed
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://Manish0000007:$HF_TOKEN@huggingface.co/spaces/Manish0000007/Infor-LN-Trace-Compare main
