name: Sync to Hugging Face Spaces

on:
  push:
    # This allows it to trigger whether your default branch is main OR master
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # HEAD detects whatever branch GitHub is currently running on (main or master)
        run: git push --force https://Manish0000007:$HF_TOKEN@huggingface.co/spaces/Manish0000007/Infor-LN-Trace-Compare HEAD:main
